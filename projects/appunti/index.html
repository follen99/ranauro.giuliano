<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Giuliano Ranauro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <!-- marked.js for Markdown rendering (cdnjs, no npm needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   rgba(255,255,255,0.04);
      --glass:     rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --accent:    #4f9eff;
      --accent2:   #a78bfa;
      --accent3:   #34d399;
      --text:      #e8eaf0;
      --muted:     #6b7a99;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 5%, rgba(79,158,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(167,139,250,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8,12,20,0.65);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .06em;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { flex-shrink: 0; }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    /* ── layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 6.5rem 2rem 5rem;
    }

    /* ── readme container ── */
    .readme-card {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .readme-topbar {
      padding: .9rem 1.4rem;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .topbar-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .topbar-dot.r { background: #ff5f57; }
    .topbar-dot.y { background: #ffbd2e; }
    .topbar-dot.g { background: #28c840; }

    .topbar-filename {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--muted);
      margin-left: .3rem;
    }

    .readme-body {
      padding: 2.5rem 3rem;
    }
    @media (max-width: 600px) { .readme-body { padding: 1.5rem 1.2rem; } }

    /* ── markdown styles ── */
    .readme-body h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .readme-body h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin: 2.2rem 0 .8rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .readme-body h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      margin: 1.6rem 0 .5rem;
    }
    .readme-body p {
      font-family: var(--font-mono);
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: .9rem;
    }
    .readme-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .readme-body a:hover { color: #7ab8ff; }

    .readme-body ul, .readme-body ol {
      font-family: var(--font-mono);
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.8;
      margin: .6rem 0 1rem 1.4rem;
    }
    .readme-body li { margin-bottom: .3rem; }

    .readme-body code {
      font-family: var(--font-mono);
      font-size: .78rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: .15em .45em;
      color: var(--accent3);
    }
    .readme-body pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1rem 0 1.4rem;
    }
    .readme-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: .8rem;
      color: var(--text);
    }
    .readme-body blockquote {
      border-left: 3px solid var(--accent);
      padding: .5rem 1.2rem;
      margin: 1rem 0;
      background: rgba(79,158,255,0.05);
      border-radius: 0 8px 8px 0;
    }
    .readme-body blockquote p { color: rgba(232,234,240,0.7); margin: 0; }

    .readme-body table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: .8rem;
      margin: 1rem 0 1.4rem;
    }
    .readme-body th {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 600;
      padding: .6rem .9rem;
      text-align: left;
      border-bottom: 1px solid var(--glass-border);
    }
    .readme-body td {
      padding: .55rem .9rem;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .readme-body tr:last-child td { border-bottom: none; }

    /* images in readme */
    .readme-body img {
      max-width: 100%;
      border-radius: 10px;
      border: none;
      margin: 1rem auto;
      display: block;
    }

    /* badge-style pill for strong text at start of list items */
    .readme-body strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── error / loading state ── */
    .status-msg {
      font-family: var(--font-mono);
      font-size: .85rem;
      color: var(--muted);
      padding: 3rem;
      text-align: center;
    }

    /* ── fade in ── */
    .readme-card {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .55s .1s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="../../">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      back
    </a>
    <a class="nav-logo" href="../../"><span>gr</span> / portfolio</a>
  </nav>

  <div class="page-wrap">
    <div class="readme-card">
      <div class="readme-topbar">
        <div class="topbar-dot r"></div>
        <div class="topbar-dot y"></div>
        <div class="topbar-dot g"></div>
        <span class="topbar-filename" id="topbar-filename">README.md</span>
      </div>
      <div class="readme-body" id="readme-content">
        <p class="status-msg">loading README.md …</p>
      </div>
    </div>
  </div>

  <script>
    async function loadReadme() {
      const content = document.getElementById('readme-content');
      const filenameEl = document.getElementById('topbar-filename');

      // Determine current project slug from URL path
      // e.g.  /projects/my-project/  →  slug = my-project
      const parts = location.pathname.replace(/\/$/, '').split('/');
      const slug = parts[parts.length - 1];
      filenameEl.textContent = `projects/${slug}/README.md`;
      document.title = slug.replace(/-/g, ' ') + ' — Giuliano Ranauro';

      try {
        const res = await fetch('./README.md');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();

        // Configure marked
        marked.setOptions({
          gfm: true,
          breaks: false,
        });

        // Custom renderer: rewrite relative image paths so they resolve from
        // the project folder (the page is served from the same dir as README.md)
        const renderer = new marked.Renderer();
        renderer.image = (href, title, text) => {
          // href may be an object in newer marked versions
          const src = (typeof href === 'object' && href !== null) ? (href.href || href) : href;
          const alt = (typeof text === 'object' && text !== null) ? (text.text || text) : (text || '');
          const t   = (typeof title === 'string') ? ` title="${title}"` : '';
          return `<img src="${src}" alt="${alt}"${t} loading="lazy" />`;
        };

        content.innerHTML = marked.parse(md, { renderer });
      } catch (err) {
        content.innerHTML = `<p class="status-msg">⚠ Could not load README.md for this project.<br/><small>${err.message}</small></p>`;
      }
    }

    loadReadme();
  </script>
</body>
</html>
